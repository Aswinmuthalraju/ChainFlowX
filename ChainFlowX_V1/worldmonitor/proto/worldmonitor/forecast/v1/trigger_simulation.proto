syntax = "proto3";

package worldmonitor.forecast.v1;

import "sebuf/http/annotations.proto";

message TriggerSimulationRequest {
  string run_id = 1 [(sebuf.http.query) = { name: "runId" }];
}

message TriggerSimulationResponse {
  bool queued = 1;
  string run_id = 2;
  string reason = 3; // "missing_run_id", "invalid_format", "not_found", "duplicate", "redis_unavailable"
}
